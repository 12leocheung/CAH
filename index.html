<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAH Snaps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles to hide scrollbars but allow scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        body {
            overscroll-behavior-y: contain; /* Prevent pull-to-refresh on mobile */
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        .cah-black { background-color: #000000; color: #ffffff; }
        .cah-white { background-color: #ffffff; color: #000000; }
        
        /* Smooth transitions for tab sliding */
        #tab-track {
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }
        .tab-content {
            height: calc(100vh - 64px - 64px); /* Viewport - Header - Footer */
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen w-full flex flex-col overflow-hidden text-gray-900">

    <!-- Header -->
    <header class="cah-black h-16 flex items-center justify-center shrink-0 z-20 shadow-md">
        <h1 class="text-xl font-bold tracking-tight">Cards Against Humanity Snaps</h1>
    </header>

    <!-- Main Swipeable Area -->
    <main id="swipe-container" class="flex-1 relative overflow-hidden w-full bg-gray-200">
        <div id="tab-track" class="flex w-[200%] h-full">
            
            <!-- TAB 0: EXPLORE -->
            <section id="tab-explore" class="w-1/2 h-full flex flex-col tab-content no-scrollbar pb-6 relative">
                <div id="feed-container" class="p-4 space-y-6 max-w-lg mx-auto w-full">
                    <!-- Feed items injected here -->
                </div>
                <!-- Empty state -->
                <div id="empty-state" class="hidden absolute inset-0 flex flex-col items-center justify-center text-gray-500 p-8 text-center">
                    <svg class="w-16 h-16 mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <p class="text-lg font-bold">No snaps yet!</p>
                    <p class="text-sm mt-2">Swipe over to the Upload tab to share the first hilarious combination.</p>
                </div>
            </section>

            <!-- TAB 1: UPLOAD -->
            <section id="tab-upload" class="w-1/2 h-full tab-content no-scrollbar flex flex-col items-center p-4">
                
                <!-- State 1: Choose Source -->
                <div id="upload-choice-view" class="flex-1 flex flex-col items-center justify-center w-full max-w-md space-y-6">
                    <h2 class="text-2xl font-bold text-center mb-4">Share a Combo</h2>
                    
                    <button id="btn-open-camera" class="w-full bg-black text-white p-6 rounded-xl shadow-lg flex flex-col items-center justify-center space-y-3 active:scale-95 transition-transform">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <span class="text-lg font-bold">Take Photo</span>
                    </button>

                    <div class="flex items-center w-full my-4">
                        <div class="flex-grow border-t border-gray-300"></div>
                        <span class="px-4 text-gray-500 font-bold uppercase text-sm">Or</span>
                        <div class="flex-grow border-t border-gray-300"></div>
                    </div>

                    <button id="btn-upload-file" class="w-full bg-white border-2 border-black text-black p-6 rounded-xl shadow flex flex-col items-center justify-center space-y-3 active:scale-95 transition-transform relative">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span class="text-lg font-bold">Upload from Gallery</span>
                        <input type="file" id="file-input" accept="image/*" class="absolute inset-0 opacity-0 w-full h-full cursor-pointer">
                    </button>
                </div>

                <!-- State 2: Camera View -->
                <div id="camera-view" class="hidden flex-1 flex-col w-full max-w-md h-full relative bg-black rounded-xl overflow-hidden shadow-xl">
                    <video id="camera-video" class="w-full h-full object-cover" autoplay playsinline></video>
                    <div class="absolute bottom-0 inset-x-0 p-6 flex justify-between items-center bg-gradient-to-t from-black/80 to-transparent">
                        <button id="btn-cancel-camera" class="text-white bg-gray-800/50 p-3 rounded-full backdrop-blur-sm active:bg-gray-700">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                        <button id="btn-capture" class="w-16 h-16 bg-white rounded-full border-4 border-gray-300 active:bg-gray-200 active:scale-95 transition-all shadow-[0_0_0_4px_rgba(255,255,255,0.3)]"></button>
                        <div class="w-12"></div> <!-- Spacer for flex balance -->
                    </div>
                </div>

                <!-- State 3: Preview & Caption -->
                <div id="preview-view" class="hidden flex-1 flex flex-col w-full max-w-md space-y-4">
                    <div class="flex justify-between items-center mb-2">
                        <button id="btn-back-to-choice" class="text-gray-600 flex items-center font-bold active:text-black">
                            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Retake
                        </button>
                        <h3 class="font-bold">New Snap</h3>
                        <div class="w-16"></div>
                    </div>
                    
                    <div class="w-full bg-black rounded-lg overflow-hidden shadow-md aspect-square flex items-center justify-center relative">
                        <img id="image-preview" class="w-full h-full object-contain" src="" alt="Preview">
                        <!-- Loading Overlay for Analysis -->
                        <div id="analysis-overlay" class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center text-white hidden">
                            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-white mb-3"></div>
                            <p class="font-bold tracking-widest uppercase text-sm">Analyzing Card...</p>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col">
                        <textarea id="caption-input" placeholder="Write a hilarious caption..." class="w-full p-4 border border-gray-300 rounded-lg resize-none h-32 focus:ring-2 focus:ring-black focus:outline-none text-lg"></textarea>
                    </div>

                    <button id="btn-publish" class="w-full bg-black text-white p-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform disabled:opacity-50 disabled:scale-100 mt-auto">
                        Publish to Explore
                    </button>
                </div>

            </section>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="h-16 bg-white border-t border-gray-200 flex shrink-0 z-20 pb-safe">
        <button id="nav-explore" class="flex-1 flex flex-col items-center justify-center text-black font-bold transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="icon-explore"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-xs">Explore</span>
        </button>
        <button id="nav-upload" class="flex-1 flex flex-col items-center justify-center text-gray-400 font-bold transition-colors">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="icon-upload"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            <span class="text-xs">Upload</span>
        </button>
    </nav>

    <!-- Custom Modal/Alert -->
    <div id="custom-modal" class="fixed inset-0 z-50 bg-black/60 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white m-4 p-6 rounded-xl shadow-2xl max-w-sm w-full transform scale-95 transition-transform duration-300" id="modal-content-box">
            <h3 id="modal-title" class="text-xl font-bold mb-2">Notice</h3>
            <p id="modal-message" class="text-gray-600 mb-6">Message goes here.</p>
            <button id="modal-close" class="w-full bg-black text-white font-bold py-3 rounded-lg active:scale-95 transition-transform">Got it</button>
        </div>
    </div>

    <!-- Hidden Canvas for processing -->
    <canvas id="processing-canvas" class="hidden"></canvas>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- State ---
            let currentTab = 0; // 0 = Explore, 1 = Upload
            let stream = null;
            let capturedImageDataUrl = null;
            let feedData = []; // Array of { id, image, caption, timestamp }

            // --- DOM Elements ---
            const tabTrack = document.getElementById('tab-track');
            const navExplore = document.getElementById('nav-explore');
            const navUpload = document.getElementById('nav-upload');
            const swipeContainer = document.getElementById('swipe-container');
            const exploreTab = document.getElementById('tab-explore');
            
            // Views
            const uploadChoiceView = document.getElementById('upload-choice-view');
            const cameraView = document.getElementById('camera-view');
            const previewView = document.getElementById('preview-view');
            
            // Feed
            const feedContainer = document.getElementById('feed-container');
            const emptyState = document.getElementById('empty-state');

            // --- Swipe & Tab Logic ---
            let startX = 0;
            let currentX = 0;
            let isDragging = false;
            const threshold = 50; // min drag to switch tabs

            function switchTab(index) {
                currentTab = index;
                tabTrack.style.transform = `translateX(-${index * 50}%)`;
                tabTrack.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                updateNavUI();
                
                // If switching away from upload, reset its view and stop camera
                if (index === 0) {
                    setTimeout(() => {
                        resetUploadView();
                    }, 300); // Wait for transition
                }
            }

            function updateNavUI() {
                if (currentTab === 0) {
                    navExplore.classList.replace('text-gray-400', 'text-black');
                    navUpload.classList.replace('text-black', 'text-gray-400');
                    document.getElementById('icon-explore').classList.add('fill-black', 'text-black');
                    document.getElementById('icon-upload').classList.remove('fill-black');
                } else {
                    navUpload.classList.replace('text-gray-400', 'text-black');
                    navExplore.classList.replace('text-black', 'text-gray-400');
                    document.getElementById('icon-upload').classList.add('fill-black', 'text-black');
                    document.getElementById('icon-explore').classList.remove('fill-black');
                }
            }

            navExplore.addEventListener('click', () => switchTab(0));
            navUpload.addEventListener('click', () => switchTab(1));

            swipeContainer.addEventListener('touchstart', (e) => {
                // Don't interfere if interacting with canvas/inputs inside tabs
                if (e.target.tagName.toLowerCase() === 'textarea' || e.target.tagName.toLowerCase() === 'input') return;
                
                startX = e.touches[0].clientX;
                isDragging = true;
                tabTrack.style.transition = 'none'; // remove transition for direct tracking
            }, { passive: true });

            swipeContainer.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                currentX = e.touches[0].clientX;
                const diff = currentX - startX;
                
                // Calculate percentage movement based on screen width
                let movePercentage = (diff / window.innerWidth) * 50; // 50% max because w-[200%]
                
                // Base offset based on current tab
                let baseOffset = currentTab === 0 ? 0 : -50;
                let newTransform = baseOffset + movePercentage;

                // Clamp limits (don't scroll past tabs)
                if (newTransform > 0) newTransform = 0;
                if (newTransform < -50) newTransform = -50;

                tabTrack.style.transform = `translateX(${newTransform}%)`;
            }, { passive: true });

            swipeContainer.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                const diff = currentX - startX;

                if (Math.abs(diff) > threshold) {
                    if (diff > 0 && currentTab === 1) {
                        switchTab(0); // Swiped right
                    } else if (diff < 0 && currentTab === 0) {
                        switchTab(1); // Swiped left
                    } else {
                        switchTab(currentTab); // Snap back
                    }
                } else {
                    switchTab(currentTab); // Snap back if threshold not met
                }
            });

            // --- Upload & Camera Logic ---
            const btnOpenCamera = document.getElementById('btn-open-camera');
            const fileInput = document.getElementById('file-input');
            const video = document.getElementById('camera-video');
            const btnCancelCamera = document.getElementById('btn-cancel-camera');
            const btnCapture = document.getElementById('btn-capture');
            const btnBackToChoice = document.getElementById('btn-back-to-choice');
            const imagePreview = document.getElementById('image-preview');
            const captionInput = document.getElementById('caption-input');
            const btnPublish = document.getElementById('btn-publish');
            const analysisOverlay = document.getElementById('analysis-overlay');
            const processCanvas = document.getElementById('processing-canvas');
            const processCtx = processCanvas.getContext('2d', { willReadFrequently: true });

            function showView(viewId) {
                uploadChoiceView.classList.add('hidden');
                cameraView.classList.add('hidden');
                previewView.classList.add('hidden');
                document.getElementById(viewId).classList.remove('hidden');
            }

            function resetUploadView() {
                stopCamera();
                showView('upload-choice-view');
                capturedImageDataUrl = null;
                captionInput.value = '';
                fileInput.value = ''; // clear file input
            }

            async function openCamera() {
                showView('camera-view');
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment', width: { ideal: 1080 } }, 
                        audio: false 
                    });
                    video.srcObject = stream;
                } catch (err) {
                    console.error("Camera error:", err);
                    showModal("Camera Error", "Could not access the camera. Please check permissions or use the upload button.");
                    resetUploadView();
                }
            }

            function stopCamera() {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                    video.srcObject = null;
                }
            }

            btnOpenCamera.addEventListener('click', openCamera);
            btnCancelCamera.addEventListener('click', resetUploadView);
            btnBackToChoice.addEventListener('click', resetUploadView);

            // Handle Capture
            btnCapture.addEventListener('click', () => {
                if (!stream) return;
                
                processCanvas.width = video.videoWidth;
                processCanvas.height = video.videoHeight;
                processCtx.drawImage(video, 0, 0, processCanvas.width, processCanvas.height);
                
                const dataUrl = processCanvas.toDataURL('image/jpeg', 0.8);
                stopCamera();
                processImageForUpload(dataUrl);
            });

            // Handle File Upload
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    processImageForUpload(event.target.result);
                };
                reader.readAsDataURL(file);
            });

            // Core Logic: Process and Check Image
            function processImageForUpload(dataUrl) {
                showView('preview-view');
                imagePreview.src = dataUrl;
                btnPublish.disabled = true;
                analysisOverlay.classList.remove('hidden');

                // Load image into a hidden element to run the heuristic checker
                const img = new Image();
                img.onload = () => {
                    // Small delay to allow UI to update loading state
                    setTimeout(() => {
                        const isLikelyCAH = analyzeImageHeuristic(img);
                        analysisOverlay.classList.add('hidden');
                        
                        if (isLikelyCAH) {
                            capturedImageDataUrl = dataUrl;
                            btnPublish.disabled = false;
                            captionInput.focus();
                        } else {
                            showModal("Doesn't look like CAH!", "Our highly sophisticated (not really) checker thinks this isn't a picture of Cards Against Humanity cards. We're looking for high contrast black and white paper shapes.");
                            setTimeout(() => {
                                resetUploadView();
                            }, 500); // wait for modal to appear before resetting behind it
                        }
                    }, 500);
                };
                img.src = dataUrl;
            }

            // --- The "No API" Checker Heuristic ---
            // CAH cards are predominantly stark black and stark white. 
            // We'll analyze pixels. If the image is mostly colorful or mid-tones, reject it.
            function analyzeImageHeuristic(img) {
                // Scale down for faster processing
                const scale = 100 / Math.max(img.width, img.height);
                processCanvas.width = img.width * scale;
                processCanvas.height = img.height * scale;
                
                processCtx.drawImage(img, 0, 0, processCanvas.width, processCanvas.height);
                const imageData = processCtx.getImageData(0, 0, processCanvas.width, processCanvas.height);
                const data = imageData.data;
                
                let strongBlack = 0;
                let strongWhite = 0;
                let colored = 0;
                const totalPixels = data.length / 4;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    
                    // Calculate brightness and saturation/variance
                    const brightness = (r + g + b) / 3;
                    const max = Math.max(r, g, b);
                    const min = Math.min(r, g, b);
                    const saturation = max === 0 ? 0 : (max - min) / max;

                    // Strict threshold for CAH aesthetics
                    if (saturation < 0.2) { // Mostly grayscale
                        if (brightness < 60) strongBlack++;
                        else if (brightness > 190) strongWhite++;
                    } else {
                        colored++;
                    }
                }

                const blackRatio = strongBlack / totalPixels;
                const whiteRatio = strongWhite / totalPixels;
                const coloredRatio = colored / totalPixels;

                console.log(`Stats - Black: ${blackRatio.toFixed(2)}, White: ${whiteRatio.toFixed(2)}, Colored: ${coloredRatio.toFixed(2)}`);

                // Heuristic Rules:
                // 1. Must not be too colorful.
                // 2. Must have a significant amount of black AND/OR white.
                if (coloredRatio > 0.4) return false; // Too much color
                
                // A typical photo of cards will have a mix, or sometimes just one if zoomed in.
                // Require at least 30% of the image to be distinct black or distinct white pixels.
                if ((blackRatio + whiteRatio) > 0.3) {
                    return true;
                }
                
                return false;
            }

            // --- Publishing ---
            btnPublish.addEventListener('click', () => {
                if (!capturedImageDataUrl) return;

                const caption = captionInput.value.trim() || "No caption provided.";
                
                const newSnap = {
                    id: Date.now(),
                    image: capturedImageDataUrl,
                    caption: caption,
                    timestamp: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' })
                };

                feedData.unshift(newSnap); // Add to top
                renderFeed();
                
                // Reset and go to explore
                resetUploadView();
                switchTab(0);
                
                // Scroll to top of explore
                exploreTab.scrollTo({ top: 0, behavior: 'smooth' });
            });


            // --- Feed Rendering ---
            function renderFeed() {
                feedContainer.innerHTML = '';
                
                if (feedData.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');

                feedData.forEach(item => {
                    const card = document.createElement('article');
                    card.className = "bg-white rounded-xl shadow-md overflow-hidden border border-gray-200";
                    
                    card.innerHTML = `
                        <div class="p-3 flex items-center space-x-3 border-b border-gray-100">
                            <div class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center font-bold text-xs">A</div>
                            <div>
                                <p class="text-sm font-bold leading-tight">Anonymous User</p>
                                <p class="text-xs text-gray-500">${item.timestamp}</p>
                            </div>
                        </div>
                        <div class="w-full bg-gray-100 aspect-square flex items-center justify-center overflow-hidden relative">
                            <img src="${item.image}" alt="CAH Combo" class="w-full h-full object-contain" loading="lazy">
                        </div>
                        <div class="p-4">
                            <p class="text-gray-900 font-medium whitespace-pre-wrap">${escapeHTML(item.caption)}</p>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            }

            function escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );
            }

            // --- Custom Modal (Alert Replacement) ---
            const modal = document.getElementById('custom-modal');
            const modalContentBox = document.getElementById('modal-content-box');
            const modalTitle = document.getElementById('modal-title');
            const modalMessage = document.getElementById('modal-message');
            const btnModalClose = document.getElementById('modal-close');

            function showModal(title, message) {
                modalTitle.textContent = title;
                modalMessage.textContent = message;
                modal.classList.remove('hidden');
                // Trigger reflow for animation
                void modal.offsetWidth;
                modal.classList.remove('opacity-0');
                modalContentBox.classList.remove('scale-95');
                modalContentBox.classList.add('scale-100');
            }

            function hideModal() {
                modal.classList.add('opacity-0');
                modalContentBox.classList.remove('scale-100');
                modalContentBox.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300); // match transition duration
            }

            btnModalClose.addEventListener('click', hideModal);

            // --- Generate Mock Initial Data without external images ---
            function generateMockData() {
                // Helper to draw a mock CAH card on canvas and get Data URL
                function createMockCardImg(blackText, whiteText1, whiteText2) {
                    processCanvas.width = 600;
                    processCanvas.height = 600;
                    
                    // Background
                    processCtx.fillStyle = '#e5e7eb'; // gray-200
                    processCtx.fillRect(0, 0, 600, 600);
                    
                    // Black Card
                    processCtx.fillStyle = '#000000';
                    processCtx.fillRect(50, 50, 220, 300);
                    processCtx.fillStyle = '#ffffff';
                    processCtx.font = 'bold 24px "Helvetica Neue", Helvetica, sans-serif';
                    wrapText(processCtx, blackText, 65, 90, 190, 30);
                    
                    // White Card 1
                    processCtx.fillStyle = '#ffffff';
                    processCtx.shadowColor = 'rgba(0,0,0,0.1)';
                    processCtx.shadowBlur = 10;
                    processCtx.fillRect(300, 150, 220, 300);
                    processCtx.shadowColor = 'transparent'; // reset
                    processCtx.fillStyle = '#000000';
                    wrapText(processCtx, whiteText1, 315, 190, 190, 30);

                    // White Card 2 (if exists)
                    if(whiteText2) {
                         processCtx.fillStyle = '#ffffff';
                        processCtx.shadowColor = 'rgba(0,0,0,0.2)';
                        processCtx.shadowBlur = 15;
                        processCtx.fillRect(330, 250, 220, 300);
                        processCtx.shadowColor = 'transparent';
                        processCtx.fillStyle = '#000000';
                        wrapText(processCtx, whiteText2, 345, 290, 190, 30);
                    }

                    return processCanvas.toDataURL('image/jpeg', 0.8);
                }

                // Simple text wrapper
                function wrapText(context, text, x, y, maxWidth, lineHeight) {
                    var words = text.split(' ');
                    var line = '';
                    for(var n = 0; n < words.length; n++) {
                        var testLine = line + words[n] + ' ';
                        var metrics = context.measureText(testLine);
                        var testWidth = metrics.width;
                        if (testWidth > maxWidth && n > 0) {
                            context.fillText(line, x, y);
                            line = words[n] + ' ';
                            y += lineHeight;
                        } else {
                            line = testLine;
                        }
                    }
                    context.fillText(line, x, y);
                }

                feedData.push({
